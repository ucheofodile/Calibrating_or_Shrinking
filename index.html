function App() {
const [lang, setLang] = useState(“en”);
const [phase, setPhase] = useState(“intro”);
const [current, setCurrent] = useState(0);
const [answers, setAnswers] = useState([]);
const [selected, setSelected] = useState(null);
const [visible, setVisible] = useState(true);

const t = T[lang];
const reset = () => { setPhase(“intro”); setCurrent(0); setAnswers([]); setSelected(null); setVisible(true); };
const switchLang = (l) => { setLang(l); reset(); };

const pick = (side) => {
setSelected(side);
setTimeout(() => {
const next = […answers, side];
setAnswers(next);
setSelected(null);
setVisible(false);
setTimeout(() => {
if (current < 9) { setCurrent(current + 1); }
else { setPhase(“results”); }
setVisible(true);
}, 200);
}, 500);
};

const leftCount = answers.filter(a => a === “left”).length;
const rightCount = answers.filter(a => a === “right”).length;

const hdr = { fontFamily: “‘Poppins’, sans-serif” };
const maxW = { maxWidth: 640, margin: “0 auto”, padding: “0 20px” };

return (
<div style={{ minHeight: “100vh”, background: PALE_BG }}>
{/* Header */}
<div style={{ background: WARM_BLACK, padding: “16px 20px”, borderBottom: `3px solid ${ACCENT}`, display: “flex”, justifyContent: “space-between”, alignItems: “center” }}>
<div style={{ …hdr, fontSize: 9, letterSpacing: 2.5, color: ACCENT, textTransform: “uppercase” }}>{t.podcast}</div>
<div style={{ display: “flex”, gap: 6 }}>
{[“en”,“fr”].map(l => (
<button key={l} onClick={() => switchLang(l)} style={{ …hdr, fontSize: 11, padding: “4px 14px”, border: `1px solid ${lang===l ? ACCENT : "#444"}`, background: lang===l ? ACCENT : “transparent”, color: lang===l ? PALE_BG : “#777”, borderRadius: 2, cursor: “pointer”, letterSpacing: 1, textTransform: “uppercase” }}>{l}</button>
))}
</div>
</div>

  {/* INTRO */}
  {phase === "intro" && (

      <h1 style={{ fontSize: 30, fontWeight: "normal", color: WARM_BLACK, textAlign: "center", lineHeight: 1.3 }}>{t.title1}</h1>
      <h1 style={{ fontSize: 30, fontWeight: "normal", color: WARM_BLACK, textAlign: "center", lineHeight: 1.3, marginBottom: 14 }}>{t.title2}</h1>

        ))}
      </div>

      <button onClick={() => setPhase("exercise")} style={{ display: "block", width: "100%", padding: 18, background: WARM_BLACK, color: PALE_BG, border: "none", ...hdr, fontSize: 14, fontWeight: 500, letterSpacing: 1, cursor: "pointer", borderRadius: 2 }}>{t.begin}</button>
    </div>
  )}

  {phase === "exercise" && (
    <div style={{ ...maxW, paddingTop: 32, paddingBottom: 40 }}>
      {/* Progress */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>

        <div style={{ display: "flex", gap: 4 }}>
          {Array.from({length: 10}).map((_, i) => (
            <div key={i} style={{ width: 24, height: 3, borderRadius: 1, background: i < answers.length ? ACCENT : (i === current ? MID_GRAY : RULE_GRAY), transition: "background 0.3s" }} />

          border: `1px solid ${selected === "right" ? CHARCOAL : RULE_GRAY}`, borderRadius: 4, cursor: selected ? "default" : "pointer",
          fontSize: 16, lineHeight: 1.65, fontFamily: "'Lora', serif", textAlign: "left", transition: "all 0.3s",
          opacity: selected === "left" ? 0.4 : 1, minHeight: 120, display: "flex", flexDirection: "column", justifyContent: "space-between"

      {/* Legend */}
      <div style={{ display: "flex", justifyContent: "center", gap: 24, marginBottom: 32 }}>

        <p style={{ ...hdr, fontSize: 12, color: LIGHT_GRAY }}>{t.author}</p>
      </div>

      {/* Podcast ref */}
      <div style={{ borderTop: `1px solid ${RULE_GRAY}`, paddingTop: 20, textAlign: "center", marginBottom: 28 }}>
