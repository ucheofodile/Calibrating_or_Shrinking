<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Are You Calibrating or Shrinking?</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lora',Georgia,serif;background:#F7F5F2;color:#2C2C2C;min-height:100vh}
.header{background:#1A1A1A;padding:16px 20px;border-bottom:3px solid #8B7355;display:flex;justify-content:space-between;align-items:center}
.header-title{font-family:'Poppins',sans-serif;font-size:9px;letter-spacing:2.5px;color:#8B7355;text-transform:uppercase}
.lang-btn{font-family:'Poppins',sans-serif;font-size:11px;padding:4px 14px;border-radius:2px;cursor:pointer;letter-spacing:1px;text-transform:uppercase}
.lang-btn.active{background:#8B7355;color:#F7F5F2;border:1px solid #8B7355}
.lang-btn.inactive{background:transparent;color:#777;border:1px solid #444}
.container{max-width:640px;margin:0 auto;padding:0 20px}
.section{display:none}.section.active{display:block}
h1{font-size:30px;font-weight:normal;color:#1A1A1A;text-align:center;line-height:1.3}
.subtitle{font-family:'Poppins',sans-serif;font-size:12px;color:#6B6B6B;text-align:center;margin-bottom:36px}
.signal-title{font-family:'Poppins',sans-serif;font-size:15px;font-weight:500;color:#1A1A1A;margin-bottom:14px}
.signal-p{font-size:16px;line-height:1.75;color:#2C2C2C;margin-bottom:14px}
.signal-p.last{color:#1A1A1A;font-style:italic}
.divider{border-top:1px solid #D4D4D4;padding-top:24px;margin-bottom:28px}
.begin-btn{display:block;width:100%;padding:18px;background:#1A1A1A;color:#F7F5F2;border:none;font-family:'Poppins',sans-serif;font-size:14px;font-weight:500;letter-spacing:1px;cursor:pointer;border-radius:2px;margin-bottom:40px}
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-label{font-family:'Poppins',sans-serif;font-size:11px;color:#A8A8A8;letter-spacing:1px}
.progress-dots{display:flex;gap:4px}
.progress-dot{width:24px;height:3px;border-radius:1px;background:#D4D4D4;transition:background 0.3s}
.progress-dot.done{background:#8B7355}
.progress-dot.current{background:#6B6B6B}
.inst{font-style:italic;font-size:14px;color:#6B6B6B;text-align:center;margin-bottom:6px}
.inst-sub{font-family:'Poppins',sans-serif;font-size:11px;color:#A8A8A8;text-align:center;margin-bottom:28px}
.pair-grid{display:flex;gap:16px;transition:opacity 0.2s}
@media(max-width:600px){.pair-grid{flex-direction:column}}
.pair-btn{flex:1;padding:24px;background:white;color:#2C2C2C;border:1px solid #D4D4D4;border-radius:4px;cursor:pointer;font-size:16px;line-height:1.65;font-family:'Lora',serif;text-align:left;transition:all 0.3s;min-height:120px;display:flex;flex-direction:column;justify-content:space-between}
.pair-label{font-family:'Poppins',sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin-top:12px}
.pair-label.left{color:#8B7355}
.pair-label.right{color:#6B6B6B}
.pair-btn.sel-l{background:#8B7355;color:white;border-color:#8B7355}
.pair-btn.sel-r{background:#2C2C2C;color:white;border-color:#2C2C2C}
.pair-btn.faded{opacity:0.4}
.pair-btn.sel-l .pair-label,.pair-btn.sel-r .pair-label{color:rgba(255,255,255,0.7)}
.back-btn{font-family:'Poppins',sans-serif;font-size:12px;color:#8B7355;background:transparent;border:none;cursor:pointer;padding:12px 0;letter-spacing:0.5px;margin-top:16px}
.back-btn:hover{color:#1A1A1A}
.back-btn.hidden{visibility:hidden}
.result-title{font-family:'Poppins',sans-serif;font-size:13px;font-weight:500;color:#8B7355;letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:24px}
.pattern-row{display:flex;gap:4px;justify-content:center;margin-bottom:12px}
.pattern-box{width:28px;height:28px;border-radius:2px}
.pattern-box.left{background:#8B7355}
.pattern-box.right{background:#2C2C2C}
.legend{display:flex;justify-content:center;gap:24px;margin-bottom:32px}
.legend-item{display:flex;align-items:center;gap:6px;font-family:'Poppins',sans-serif;font-size:11px;color:#6B6B6B}
.legend-dot{width:12px;height:12px;border-radius:2px}
.pattern-note{font-style:italic;font-size:14px;color:#6B6B6B;text-align:center;margin-bottom:32px}
.shaping-section{border-top:1px solid #D4D4D4;padding-top:24px;margin-bottom:24px}
.shaping-title{font-family:'Poppins',sans-serif;font-size:13px;font-weight:500;color:#1A1A1A;margin-bottom:4px}
.shaping-sub{font-family:'Poppins',sans-serif;font-size:11px;color:#A8A8A8;margin-bottom:16px}
.shaping-item{font-size:14px;line-height:1.7;color:#2C2C2C;margin-bottom:8px;padding-left:16px}
.line-section{border-top:1px solid #D4D4D4;padding-top:24px;margin-bottom:24px}
.line-title{font-family:'Poppins',sans-serif;font-size:15px;font-weight:500;color:#1A1A1A;margin-bottom:4px}
.line-sub{font-family:'Poppins',sans-serif;font-size:11px;color:#A8A8A8;margin-bottom:16px}
.line-p{font-size:16px;line-height:1.75;margin-bottom:10px}
.closing-check{font-style:italic;font-size:14px;color:#6B6B6B;line-height:1.7;margin-bottom:24px}
.quote-section{border-top:1px solid #8B7355;padding-top:28px;text-align:center;margin-bottom:28px}
.quote-text{font-style:italic;font-size:20px;line-height:1.5;color:#1A1A1A;margin-bottom:12px}
.author{font-family:'Poppins',sans-serif;font-size:12px;color:#A8A8A8}
.pod-section{border-top:1px solid #D4D4D4;padding-top:20px;text-align:center;margin-bottom:28px}
.pod-ref{font-family:'Poppins',sans-serif;font-size:12px;color:#6B6B6B;margin-bottom:4px}
.pod-listen{font-family:'Poppins',sans-serif;font-size:11px;color:#A8A8A8}
.reset-btn{display:block;width:100%;padding:16px;background:transparent;color:#8B7355;border:1px solid #8B7355;font-family:'Poppins',sans-serif;font-size:13px;font-weight:500;letter-spacing:1px;cursor:pointer;border-radius:2px;margin-bottom:40px}
</style>
</head>
<body>

<div class="header">
  <div class="header-title" id="podcastName"></div>
  <div style="display:flex;gap:6px">
    <button class="lang-btn active" id="btn-en" onclick="switchLang('en')">EN</button>
    <button class="lang-btn inactive" id="btn-fr" onclick="switchLang('fr')">FR</button>
  </div>
</div>

<div class="container">
  <div class="section active" id="intro" style="padding-top:40px;padding-bottom:40px">
    <h1 id="title1"></h1>
    <h1 id="title2" style="margin-bottom:14px"></h1>
    <div class="subtitle" id="subtitle"></div>
    <div class="divider">
      <div class="signal-title" id="signalTitle"></div>
      <div id="signalText"></div>
    </div>
    <button class="begin-btn" id="beginBtn" onclick="startExercise()"></button>
  </div>

  <div class="section" id="exercise" style="padding-top:32px;padding-bottom:40px">
    <div class="progress-row">
      <span class="progress-label" id="progressLabel"></span>
      <div class="progress-dots" id="progressDots"></div>
    </div>
    <div class="inst" id="instText"></div>
    <div class="inst-sub" id="instSub"></div>
    <div class="pair-grid" id="pairGrid">
      <button class="pair-btn" id="leftBtn" onclick="pick('left')">
        <span id="leftText"></span>
        <span class="pair-label left" id="leftLabel"></span>
      </button>
      <button class="pair-btn" id="rightBtn" onclick="pick('right')">
        <span id="rightText"></span>
        <span class="pair-label right" id="rightLabel"></span>
      </button>
    </div>
    <button class="back-btn hidden" id="backBtn" onclick="goBack()">&larr; Go back</button>
  </div>

  <div class="section" id="results" style="padding-top:40px;padding-bottom:40px">
    <div class="result-title" id="resultTitle"></div>
    <div class="pattern-row" id="patternRow"></div>
    <div class="legend" id="legend"></div>
    <div class="pattern-note" id="patternNote"></div>
    <div class="shaping-section">
      <div class="shaping-title" id="shapingTitle"></div>
      <div class="shaping-sub" id="shapingSub"></div>
      <div id="shapingItems"></div>
    </div>
    <div class="line-section">
      <div class="line-title" id="lineTitle"></div>
      <div class="line-sub" id="lineSub"></div>
      <div id="lineContent"></div>
      <div class="closing-check" id="closingCheck"></div>
    </div>
    <div class="quote-section">
      <div class="quote-text" id="quoteText"></div>
      <div class="author" id="authorText"></div>
    </div>
    <div class="pod-section">
      <div class="pod-ref" id="podRef"></div>
      <div class="pod-listen" id="podListen"></div>
    </div>
    <button class="reset-btn" id="resetBtn" onclick="resetAll()"></button>
  </div>
</div>

<script>
var T={en:{podcast:"DON'T LET THE SMILE FOOL YOU",title1:"Are You Calibrating",title2:"or Shrinking?",subtitle:"A self-diagnostic from the episode: They Called Me Aggressive. So I Went Silent.",signalTitle:"The Signal",signal:["In leadership, you learn to adjust. You read the room. You adapt your tone. You pay attention to how you come across. That\u2019s part of the job.","But sometimes a label starts to follow you \u2014 intense, aggressive, emotional, too much \u2014 and without anyone asking you to change, you start to change anyway. You soften. You hold back. You edit yourself down.","From the outside, this can look like maturity. Sometimes it isn\u2019t maturity. Sometimes it\u2019s disappearance."],inst:"For each pair, tap the statement that sounds more like you right now.",instSub:"No scoring. No judgment. Just recognition.",colL:"Calibrating",colR:"Shrinking",pairs:[["I stayed quiet because the room needed listening, not more noise.","I stayed quiet because I didn\u2019t want my voice to become the issue again."],["I choose my words more carefully now.","I rehearse my words so carefully that I sometimes say nothing."],["I\u2019ve learned how to challenge without making the room defensive.","I\u2019ve stopped challenging because I don\u2019t want to be described as difficult."],["I adjust my tone so the message can be heard.","I adjust myself so the label doesn\u2019t come back."],["I know when to push and when to let it go.","I remove myself from the conversation before anyone has to react to me."],["I use feedback to sharpen how I lead.","I carry old comments into new rooms."],["I\u2019m quieter because I\u2019m more deliberate.","I\u2019m quieter because I\u2019ve made myself less visible."],["I\u2019ve changed because I\u2019ve grown.","I\u2019ve changed because I started managing myself around other people\u2019s labels."],["I still contribute, but with more judgment.","I contribute less because it feels easier not to be read wrongly."],["I can see how the change has made me stronger.","I can see how the change has made me smaller."]],shapingTitle:"Unintentions \u2014 when you shape the signal without realising it",shapingSub:"An unintention is something you say or do without fully understanding the consequence it has on the other person. These are some of the most common ones.",shapingItems:["You once told someone they were being too emotional in a meeting. You were trying to help them. You never thought about it again. They think about it every time they speak.","You\u2019ve described a colleague the same way more than once \u2014 too much, too emotional, too intense. To you it\u2019s just an observation. To them it might be becoming an instruction.","You sent a message after a meeting about how someone came across. In your mind, you were looking out for them. In their mind, that message is still playing.","Someone around you has gone noticeably quieter. You haven\u2019t connected that to anything you said. Maybe you should."],lineTitle:"The Line",lineSub:"The distinction that matters",aw:["Self-awareness","makes you sharper. You notice more. You adjust with intention. You stay in the room."],sc:["Self-consciousness","makes you smaller. You monitor yourself. You anticipate labels. You begin to disappear."],closingCheck:"If most of your answers were on the shrinking side, you\u2019re not alone. That\u2019s why this episode exists. The next time you catch yourself editing before you speak \u2014 pause. Ask yourself: is this growth, or is this the label talking?",quote:"You should be able to adjust your approach without losing your voice.",author:"\u2014 Uche Ofodile",podRef:"From the podcast: Don\u2019t Let The Smile Fool You",listenRef:"Listen wherever you get your podcasts",begin:"Begin",of:"of",startOver:"Start over",patternTitle:"Your Pattern",patternNote:"This is not a score. It\u2019s a signal.",back:"\u2190 Go back"},fr:{podcast:"DON'T LET THE SMILE FOOL YOU",title1:"Vous vous ajustez\u2026",title2:"ou vous vous effacez\u00a0?",subtitle:"Un auto-diagnostic tir\u00e9 de l\u2019\u00e9pisode : On m\u2019a dit que j\u2019\u00e9tais \u201ctrop\u201d. Alors je me suis tue.",signalTitle:"Le Signal",signal:["En leadership, on apprend \u00e0 s\u2019ajuster. On lit la salle. On adapte son ton. On fait attention \u00e0 la fa\u00e7on dont on est per\u00e7u. \u00c7a fait partie du m\u00e9tier.","Mais parfois, une \u00e9tiquette commence \u00e0 vous suivre \u2014 intense, agressive, \u00e9motionnelle, trop \u2014 et sans que personne ne vous le demande, vous commencez \u00e0 changer. Vous vous adoucissez. Vous vous retenez. Vous vous r\u00e9duisez.","Vu de l\u2019ext\u00e9rieur, \u00e7a peut ressembler \u00e0 de la maturit\u00e9. Parfois ce n\u2019est pas de la maturit\u00e9. Parfois, c\u2019est de l\u2019effacement."],inst:"Pour chaque paire, touchez l\u2019affirmation qui vous ressemble le plus en ce moment.",instSub:"Pas de score. Pas de jugement. Juste de la reconnaissance.",colL:"S\u2019ajuster",colR:"S\u2019effacer",pairs:[["Je me suis tue parce que la salle avait besoin d\u2019\u00e9coute, pas de bruit.","Je me suis tue parce que je ne voulais pas que ma voix redevienne le probl\u00e8me."],["Je choisis mes mots avec plus de soin maintenant.","Je r\u00e9p\u00e8te tellement mes mots dans ma t\u00eate que parfois je ne dis rien."],["J\u2019ai appris \u00e0 challenger sans braquer la salle.","J\u2019ai arr\u00eat\u00e9 de challenger parce que je ne veux pas qu\u2019on me d\u00e9crive comme difficile."],["J\u2019ajuste mon ton pour que le message passe.","Je m\u2019ajuste pour que l\u2019\u00e9tiquette ne revienne pas."],["Je sais quand insister et quand l\u00e2cher prise.","Je me retire de la conversation avant que quelqu\u2019un ait \u00e0 r\u00e9agir \u00e0 moi."],["J\u2019utilise les retours pour affiner mon leadership.","Je transporte les anciens commentaires dans les nouvelles salles."],["Je suis plus discr\u00e8te parce que je suis plus intentionnelle.","Je suis plus discr\u00e8te parce que je me suis rendue moins visible."],["J\u2019ai chang\u00e9 parce que j\u2019ai grandi.","J\u2019ai chang\u00e9 parce que j\u2019ai commenc\u00e9 \u00e0 me g\u00e9rer autour des \u00e9tiquettes des autres."],["Je contribue toujours, mais avec plus de discernement.","Je contribue moins parce que c\u2019est plus simple que d\u2019\u00eatre mal lue."],["Je vois comment le changement m\u2019a rendue plus forte.","Je vois comment le changement m\u2019a rendue plus petite."]],shapingTitle:"Unintentions \u2014 quand vous fa\u00e7onnez le signal sans vous en rendre compte",shapingSub:"Une unintention, c\u2019est quelque chose que vous dites ou faites sans comprendre pleinement la cons\u00e9quence que \u00e7a a sur l\u2019autre personne. Voici les plus courantes.",shapingItems:["Vous avez dit \u00e0 quelqu\u2019un qu\u2019il \u00e9tait trop \u00e9motionnel en r\u00e9union. Vous vouliez l\u2019aider. Vous n\u2019y avez plus jamais pens\u00e9. Cette personne y pense \u00e0 chaque fois qu\u2019elle prend la parole.","Vous avez d\u00e9crit un coll\u00e8gue de la m\u00eame fa\u00e7on plus d\u2019une fois \u2014 trop, trop \u00e9motionnelle, trop intense. Pour vous, c\u2019est une observation. Pour eux, c\u2019est peut-\u00eatre en train de devenir une consigne.","Vous avez envoy\u00e9 un message apr\u00e8s une r\u00e9union sur la fa\u00e7on dont quelqu\u2019un s\u2019\u00e9tait comport\u00e9. Dans votre esprit, vous veilliez sur cette personne. Dans le sien, ce message tourne encore.","Quelqu\u2019un autour de vous est devenu nettement plus silencieux. Vous n\u2019avez pas fait le lien avec quelque chose que vous avez dit. Peut-\u00eatre que vous devriez."],lineTitle:"La Ligne",lineSub:"La distinction qui compte",aw:["La conscience de soi","vous rend plus pr\u00e9cise. Vous remarquez davantage. Vous ajustez avec intention. Vous continuez \u00e0 prendre votre place."],sc:["L\u2019hyperconscience de soi","vous rend plus petite. Vous vous surveillez. Vous anticipez les \u00e9tiquettes. Vous commencez \u00e0 vous effacer."],closingCheck:"Si la plupart de vos r\u00e9ponses se trouvent du c\u00f4t\u00e9 effacement, vous n\u2019\u00eates pas seule. C\u2019est pour \u00e7a que cet \u00e9pisode existe. La prochaine fois que vous vous surprenez \u00e0 vous \u00e9diter avant de parler \u2014 faites une pause. Demandez-vous\u00a0: est-ce de la croissance, ou est-ce l\u2019\u00e9tiquette qui parle\u00a0?",quote:"Vous devriez pouvoir ajuster votre approche sans perdre votre voix.",author:"\u2014 Uche Ofodile",podRef:"Du podcast : Don\u2019t Let The Smile Fool You",listenRef:"Disponible sur toutes les plateformes de podcasts",begin:"Commencer",of:"sur",startOver:"Recommencer",patternTitle:"Votre Sch\u00e9ma",patternNote:"Ce n\u2019est pas un score. C\u2019est un signal.",back:"\u2190 Retour"}};

var lang="en",current=0,answers=[],locked=false;

function switchLang(l){lang=l;document.getElementById("btn-en").className=l==="en"?"lang-btn active":"lang-btn inactive";document.getElementById("btn-fr").className=l==="fr"?"lang-btn active":"lang-btn inactive";resetAll()}

function showSection(id){var s=document.querySelectorAll(".section");for(var i=0;i<s.length;i++)s[i].classList.remove("active");document.getElementById(id).classList.add("active")}

function renderIntro(){var t=T[lang];document.getElementById("podcastName").textContent=t.podcast;document.getElementById("title1").textContent=t.title1;document.getElementById("title2").textContent=t.title2;document.getElementById("subtitle").textContent=t.subtitle;document.getElementById("signalTitle").textContent=t.signalTitle;var h="";for(var i=0;i<t.signal.length;i++){var c=i===t.signal.length-1?"signal-p last":"signal-p";h+='<p class="'+c+'">'+t.signal[i]+"</p>"}document.getElementById("signalText").innerHTML=h;document.getElementById("beginBtn").textContent=t.begin;showSection("intro")}

function startExercise(){current=0;answers=[];locked=false;renderPair();showSection("exercise")}

function renderPair(){var t=T[lang];document.getElementById("progressLabel").textContent=(current+1)+" "+t.of+" 10";var d="";for(var i=0;i<10;i++){var c="progress-dot";if(i<answers.length)c+=" done";else if(i===current)c+=" current";d+='<div class="'+c+'"></div>'}document.getElementById("progressDots").innerHTML=d;document.getElementById("instText").textContent=t.inst;document.getElementById("instSub").textContent=t.instSub;document.getElementById("leftText").textContent=t.pairs[current][0];document.getElementById("rightText").textContent=t.pairs[current][1];document.getElementById("leftLabel").textContent=t.colL;document.getElementById("rightLabel").textContent=t.colR;document.getElementById("leftBtn").className="pair-btn";document.getElementById("rightBtn").className="pair-btn";document.getElementById("pairGrid").style.opacity="1";var bb=document.getElementById("backBtn");bb.textContent=t.back;bb.className=current>0?"back-btn":"back-btn hidden"}

function pick(side){if(locked)return;locked=true;var lb=document.getElementById("leftBtn"),rb=document.getElementById("rightBtn");if(side==="left"){lb.classList.add("sel-l");rb.classList.add("faded")}else{rb.classList.add("sel-r");lb.classList.add("faded")}setTimeout(function(){answers.push(side);if(current<9){document.getElementById("pairGrid").style.opacity="0";setTimeout(function(){current++;locked=false;renderPair()},200)}else{renderResults();showSection("results")}},500)}

function goBack(){if(current>0&&!locked){answers.pop();current--;renderPair()}}

function renderResults(){var t=T[lang],lc=0,rc=0;for(var i=0;i<answers.length;i++){if(answers[i]==="left")lc++;else rc++}document.getElementById("resultTitle").textContent=t.patternTitle;var p="";for(var i=0;i<answers.length;i++)p+='<div class="pattern-box '+answers[i]+'"></div>';document.getElementById("patternRow").innerHTML=p;document.getElementById("legend").innerHTML='<div class="legend-item"><div class="legend-dot" style="background:#8B7355"></div>'+t.colL+" ("+lc+")</div>"+'<div class="legend-item"><div class="legend-dot" style="background:#2C2C2C"></div>'+t.colR+" ("+rc+")</div>";document.getElementById("patternNote").textContent=t.patternNote;document.getElementById("shapingTitle").textContent=t.shapingTitle;document.getElementById("shapingSub").textContent=t.shapingSub;var s="";for(var i=0;i<t.shapingItems.length;i++)s+='<p class="shaping-item">\u2014 '+t.shapingItems[i]+"</p>";document.getElementById("shapingItems").innerHTML=s;document.getElementById("lineTitle").textContent=t.lineTitle;document.getElementById("lineSub").textContent=t.lineSub;document.getElementById("lineContent").innerHTML='<p class="line-p"><strong>'+t.aw[0]+"</strong> "+t.aw[1]+"</p>"+'<p class="line-p"><strong>'+t.sc[0]+"</strong> "+t.sc[1]+"</p>";document.getElementById("closingCheck").textContent=t.closingCheck;document.getElementById("quoteText").textContent=t.quote;document.getElementById("authorText").textContent=t.author;document.getElementById("podRef").textContent=t.podRef;document.getElementById("podListen").textContent=t.listenRef;document.getElementById("resetBtn").textContent=t.startOver}

function resetAll(){current=0;answers=[];locked=false;renderIntro()}

renderIntro();
</script>
</body>
</html>
